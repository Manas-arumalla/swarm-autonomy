# Default Swarm Autonomy parameters. Overridden per-drone by the launch files, which
# remap nodes into the /drone_N namespace.

/**:
  ros__parameters:
    use_sim_time: true

offboard_control:
  ros__parameters:
    takeoff_alt_m: 2.5
    kp_xy: 1.2
    kp_z: 1.5

vio_to_ekf2_bridge:
  ros__parameters:
    vio_odom_topic: "odometry"
    publish_rate_hz: 30.0

map_merge_node:
  ros__parameters:
    voxel_size_m: 0.2

planner_node:
  ros__parameters:
    profile: "nav"          # nav | explore | coop_explore

coordination_node:
  ros__parameters:
    containment_radius_m: 8.0
    pursuer_speed_mps: 3.0
    predict_horizon_s: 1.5

comms_middleware:
  ros__parameters:
    bandwidth_bps: 50000.0  # per-link delivered-throughput cap
    max_range_m: 80.0
    soft_range_m: 50.0
    base_loss: 0.02
    stats_window_s: 1.0
    seed: 0
